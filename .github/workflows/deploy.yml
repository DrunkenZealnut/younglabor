name: Deploy to Cafe24

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Get changed files
        id: changes
        run: |
          # 변경된 파일 목록 추출 (제외 패턴 적용)
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
            ':!.github' ':!.gitignore' ':!CLAUDE.md' ':!.claude' \
            ':!.env' ':!.env.local' ':!.DS_Store' \
            ':!msds/.expo' ':!consult' ':!data' \
            ':!test-config.php' ':!msds/TROUBLESHOOTING.md' \
            ':!msds/OPENAPI_MSDS_20240603.pdf' \
            2>/dev/null || echo "")

          if [ -z "$CHANGED" ]; then
            echo "No deployable files changed."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changed files:"
            echo "$CHANGED"
            echo "$CHANGED" > /tmp/changed_files.txt
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy changed files via FTP
        if: steps.changes.outputs.has_changes == 'true'
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          # 변경된 파일만 개별 업로드 (FTP 홈 디렉토리 = /www)
          while IFS= read -r file; do
            [ -z "$file" ] && continue

            if [ ! -f "$file" ]; then
              echo "Deleting: $file"
              lftp -c "set ftp:passive-mode yes; set ftp:ssl-allow no; open -u $FTP_USER,$FTP_PASS $FTP_HOST; rm -f \"$file\"" 2>/dev/null || true
            else
              DIR=$(dirname "$file")
              echo "Uploading: $file"
              lftp -c "set ftp:passive-mode yes; set ftp:ssl-allow no; open -u $FTP_USER,$FTP_PASS $FTP_HOST; mkdir -p -f \"$DIR\"; put \"$file\" -o \"$file\""
            fi
          done < /tmp/changed_files.txt

          echo "Deploy complete!"

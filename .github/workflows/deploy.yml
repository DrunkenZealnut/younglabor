name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SFTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via LFTP (SFTP)
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
            -e "
              set sftp:auto-confirm yes;
              set net:timeout 30;
              set net:max-retries 3;
              mirror --reverse --delete --verbose \
                --exclude ^\.git/ \
                --exclude ^\.env \
                --exclude ^\.gitignore$ \
                --exclude ^CLAUDE\.md$ \
                --exclude ^admin-panel-migration\.sql$ \
                --exclude ^\.DS_Store$ \
                --exclude logs/ \
                ./ /www/younglabor/;
              bye
            " \
            sftp://${{ secrets.FTP_SERVER }}

name: Deploy to Cafe24

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Webhook Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy webhook
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '{"ref":"refs/heads/main","pusher":{"name":"github-actions"}}' | openssl dgst -sha256 -hmac '${{ secrets.DEPLOY_SECRET }}' | awk '{print $2}')" \
            -d '{"ref":"refs/heads/main","pusher":{"name":"github-actions"}}' \
            "https://younglabor.kr/api/deploy.php")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Response: $BODY"
          echo "HTTP Code: $HTTP_CODE"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Deploy successful!"
          else
            echo "Deploy failed!"
            exit 1
          fi

name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via LFTP
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
            -e "
              set ftp:passive-mode yes;
              set ftp:ssl-allow yes;
              set ssl:verify-certificate no;
              set net:timeout 30;
              set net:max-retries 3;
              mirror --reverse --delete --verbose \
                --exclude ^\.git/ \
                --exclude ^\.env \
                --exclude ^\.gitignore$ \
                --exclude ^CLAUDE\.md$ \
                --exclude ^admin-panel-migration\.sql$ \
                --exclude ^\.DS_Store$ \
                --exclude logs/ \
                ./ /www/younglabor/;
              bye
            " \
            "${{ secrets.FTP_SERVER }}"

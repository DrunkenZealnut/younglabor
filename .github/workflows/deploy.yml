name: Deploy to Cafe24

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Get changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
            ':!.github' ':!.gitignore' ':!CLAUDE.md' ':!.claude' \
            ':!.env' ':!.env.local' ':!.DS_Store' \
            ':!msds/.expo' ':!consult' ':!data' \
            ':!test-config.php' ':!msds/TROUBLESHOOTING.md' \
            ':!msds/OPENAPI_MSDS_20240603.pdf' \
            2>/dev/null || echo "")

          if [ -z "$CHANGED" ]; then
            echo "No deployable files changed."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changed files:"
            echo "$CHANGED"
            echo "$CHANGED" > /tmp/changed_files.txt
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy changed files via FTP
        if: steps.changes.outputs.has_changes == 'true'
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          # lftp 스크립트 생성
          SCRIPT=$(mktemp)
          cat > "$SCRIPT" << 'LFTP_HEADER'
          set ftp:passive-mode yes
          set ftp:ssl-allow no
          LFTP_HEADER

          echo "open -u $FTP_USER,$FTP_PASS $FTP_HOST" >> "$SCRIPT"

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            if [ ! -f "$file" ]; then
              echo "Deleting: $file"
              echo "rm -f \"$file\"" >> "$SCRIPT"
            else
              DIR=$(dirname "$file")
              echo "Uploading: $file"
              if [ "$DIR" != "." ]; then
                echo "mkdir -p -f \"$DIR\"" >> "$SCRIPT"
              fi
              echo "put \"$file\" -o \"$file\"" >> "$SCRIPT"
            fi
          done < /tmp/changed_files.txt

          echo "bye" >> "$SCRIPT"

          # 실행
          lftp -f "$SCRIPT"
          rm -f "$SCRIPT"
          echo "Deploy complete!"
